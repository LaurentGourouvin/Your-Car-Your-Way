spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ycyw_poc
    username: ycyw
    password: ycyw_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: yourcaryourway_poc_secret_key_must_be_at_least_256_bits_long
  expiration: 86400000