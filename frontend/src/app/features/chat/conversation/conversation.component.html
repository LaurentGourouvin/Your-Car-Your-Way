<div class="min-h-screen bg-gray-100 flex flex-col">
  <header class="bg-blue-600 text-white px-6 py-4 flex justify-between items-center">
    <h1 class="font-bold text-lg">Support Chat</h1>
    <button (click)="logout()" class="text-sm underline">Déconnexion</button>
  </header>

  <div class="flex-1 flex flex-col max-w-2xl mx-auto w-full p-4">

    @if (!conversation()) {
      <div class="flex-1 flex items-center justify-center">
        <div class="text-center">
          <p class="text-gray-600 mb-4">Contactez notre support</p>
          <button
            (click)="openConversation()"
            [disabled]="isLoading()"
            class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 disabled:opacity-50"
          >
            @if (isLoading()) { Connexion... } @else { Démarrer une conversation }
          </button>
        </div>
      </div>
    } @else {
      <div class="flex-1 flex flex-col bg-white rounded-lg shadow">
        <div class="p-4 border-b">
          <span class="text-sm text-gray-500">Statut : </span>
          <span class="text-sm font-medium">{{ conversation()!.status }}</span>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-3 min-h-64">
          @for (msg of messages(); track msg.id) {
            <div [class]="msg.senderType === 'CLIENT' ? 'flex justify-end' : 'flex justify-start'">
              <div [class]="msg.senderType === 'CLIENT'
                ? 'bg-blue-600 text-white px-4 py-2 rounded-lg max-w-xs'
                : 'bg-gray-200 text-gray-800 px-4 py-2 rounded-lg max-w-xs'">
                <p class="text-sm">{{ msg.content }}</p>
                <p class="text-xs opacity-70 mt-1">{{ msg.senderType }}</p>
              </div>
            </div>
          }
        </div>

        <div class="p-4 border-t flex gap-2">
          <input
            type="text"
            [value]="messageContent()"
            (input)="messageContent.set($any($event.target).value)"
            (keyup.enter)="sendMessage()"
            placeholder="Votre message..."
            class="flex-1 border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <button
            (click)="sendMessage()"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
          >
            Envoyer
          </button>
        </div>
      </div>
    }
  </div>
</div>
