version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ycyw_poc_db
    environment:
      POSTGRES_DB: ycyw_poc
      POSTGRES_USER: ycyw
      POSTGRES_PASSWORD: ycyw_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
